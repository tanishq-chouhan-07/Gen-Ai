<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen-Ai Enterprise Document Agent</title>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --chat-bg: #ffffff;
            --user-bubble: #007bff;
            --user-text: #ffffff;
            --ai-bubble: #e9ecef;
            --ai-text: #333333;
            --citation-bg: #eef6ff;
            --citation-border: #b8daff;
            --citation-text: #0056b3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--chat-bg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background-color: #343a40;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            position: relative;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background-color: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            align-self: flex-start;
            background-color: var(--ai-bubble);
            color: var(--ai-text);
            border-bottom-left-radius: 4px;
        }
        .message.ai strong {
            font-weight: 600;
        }
        .citations-container {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #d1d5db;
            font-size: 0.8rem;
        }
        .citation-chip {
            display: inline-block;
            background-color: var(--citation-bg);
            color: var(--citation-text);
            border: 1px solid var(--citation-border);
            padding: 4px 8px;
            border-radius: 12px;
            margin-right: 5px;
            margin-bottom: 5px;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .citation-chip:hover {
            background-color: #dbeaff;
        }
        .chat-input-area {
            padding: 15px 20px;
            background-color: #f8f9fa;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 24px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input:focus {
            border-color: var(--user-bubble);
        }
        .send-btn {
            background-color: var(--user-bubble);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 24px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .send-btn:hover {
            background-color: #0056b3;
        }
        .send-btn:disabled {
            background-color: #a0c4ff;
            cursor: not-allowed;
        }
        .typing-indicator {
            font-size: 0.8rem;
            color: #6c757d;
            margin-left: 15px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        Enterprise Document AI Agent
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message ai">
            Hello! I am your enterprise document assistant. Ask me anything about the uploaded documents.
        </div>
    </div>
    
    <div class="typing-indicator" id="typingIndicator">Agent is thinking...</div>

    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Ask a question..." autocomplete="off">
        <button class="send-btn" id="sendBtn">Send</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');

    // Generate a random session ID for this browser session
    // This allows you to test conversational memory (e.g., "What version of it?")
    const sessionId = "frontend_" + Math.random().toString(36).substring(2, 10);

    async function sendMessage() {
        const query = chatInput.value.trim();
        if (!query) return;

        // Disable input and show typing indicator
        chatInput.value = '';
        sendBtn.disabled = true;
        typingIndicator.style.display = 'block';

        // Add user message to UI
        addMessageToUI(query, 'user');

        try {
            // Call the FastAPI backend
            const response = await fetch('http://localhost:8000/api/v1/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    query: query,
                    session_id: sessionId,
                    stream: false
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            
            // Add AI message to UI with citations
            addMessageToUI(data.answer, 'ai', data.citations);

        } catch (error) {
            console.error("Error calling API:", error);
            addMessageToUI("Oops! Something went wrong connecting to the server.", 'ai');
        } finally {
            // Re-enable input and hide typing indicator
            sendBtn.disabled = false;
            typingIndicator.style.display = 'none';
            chatInput.focus();
        }
    }

    function addMessageToUI(text, sender, citations = []) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        
        // Basic sanitization (replace < and > to prevent raw HTML injection)
        let safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        
        // Convert markdown bold **text** to <strong>text</strong> for better display
        safeText = safeText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        messageDiv.innerHTML = safeText;

        // If AI message has citations, render them
        if (sender === 'ai' && citations.length > 0) {
            const citationsDiv = document.createElement('div');
            citationsDiv.classList.add('citations-container');
            
            citations.forEach(cite => {
                const chip = document.createElement('span');
                chip.classList.add('citation-chip');
                chip.innerHTML = `[${cite.citation_number}] ${cite.filename} (p. ${cite.page_number})`;
                
                // Tooltip with preview
                chip.title = `${cite.content_preview}...\nRelevance: ${(cite.relevance_score * 100).toFixed(1)}%`;
                
                citationsDiv.appendChild(chip);
            });
            
            messageDiv.appendChild(citationsDiv);
        }

        chatMessages.appendChild(messageDiv);
        // Scroll to bottom
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>

</body>
</html>

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gen-ai-postgres
    environment:
      POSTGRES_USER: docai_user
      POSTGRES_PASSWORD: docai_password
      POSTGRES_DB: docai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docai_user -d docai_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gen-ai-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: gen-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gen-ai-network
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: gen-ai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gen-ai-network
    restart: always

networks:
  gen-ai-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data: